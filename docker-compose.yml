version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_DATABASE=vision_perfecta
      - DB_USERNAME=root
      - DB_PASSWORD=rootpassword
      - APP_ENV=production
      - APP_DEBUG=false
    volumes:
      - .:/var/www
    depends_on:
      - db
    networks:
      - visionperfecta

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=vision_perfecta
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - visionperfecta

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - visionperfecta

networks:
  visionperfecta:
    driver: bridge

volumes:
  mysql_data:
